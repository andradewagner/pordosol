<div class="container-contatos">
  <header class="topo-pagina">
    <h1>Contatos Úteis</h1>
    <p>Telefones de emergência e serviços do condomínio</p>
  </header>

  <div class="lista-cards">
    <div class="card-contato" *ngFor="let contato of contatos">
      
      <!-- Bloco da Imagem da Empresa/Serviço -->
      <div class="avatar-container">
        <img [src]="contato.imagemUrl" [alt]="contato.nome" class="avatar-img">
      </div>

      <!-- Informações do Contato -->
      <div class="info-contato">
        <h2>{{ contato.nome }}</h2>
        <p class="servico">{{ contato.servico }}</p>
        <p class="telefone">{{ contato.telefone }}</p>
      </div>

      <!-- Botão de Ação Direta (Ligar) -->
      <button class="btn-ligar" (click)="fazerLigacao(contato.telefone)" aria-label="Ligar">
        <svg xmlns="http://w3.org" viewBox="0 0 24 24" fill="currentColor" class="icone-telefone">
          <path d="M10.5 18.75a.75.75 0 0 0 0 1.5h3a.75.75 0 0 0 0-1.5h-3Z" />
          <path fill-rule="evenodd" d="M7.125 1.5A3.375 3.375 0 0 0 3.75 4.875v14.25A3.375 3.375 0 0 0 7.125 22.5h9.75a3.375 3.375 0 0 0 3.375-3.375V4.875A3.375 3.375 0 0 0 16.875 1.5h-9.75ZM5.25 4.875c0-.621.504-1.125 1.125-1.125h9.75c.621 0 1.125.504 1.125 1.125v14.25c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 0 1-1.125-1.125V4.875Z" clip-rule="evenodd" />
        </svg>
      </button>

    </div>
  </div>
</div>
