<div class="container-prestacao">
  
  <!-- TELA DE LOGIN (Caso não esteja logado) -->
  <div *ngIf="!estaLogado" class="tela-login">
    <header class="topo-pagina">
      <h1>Área Restrita</h1>
      <p>Digite as credenciais fornecidas pela administração para ver a prestação de contas.</p>
    </header>

    <form (ngSubmit)="executarLogin()" class="formulario-login">
      <div class="campo-grupo">
        <label for="codigo">Código do Morador</label>
        <input type="text" id="codigo" name="codigo" [(ngModel)]="codigo" placeholder="Ex: pordosol123" required>
      </div>

      <div class="campo-grupo">
        <label for="senha">Senha de Acesso</label>
        <input type="password" id="senha" name="senha" [(ngModel)]="senha" placeholder="••••••••" required>
      </div>

      <p *ngIf="erroMensagem" class="erro-texto">{{ erroMensagem }}</p>

      <button type="submit" class="btn-principal">Entrar no Sistema</button>
    </form>
  </div>

  <!-- CONTEÚDO DA PRESTAÇÃO (Exibe apenas se o login estiver ok) -->
  <div *ngIf="estaLogado">
    <header class="topo-pagina header-logado">
      <div>
        <h1>Prestação de Contas</h1>
        <p>Mês de referência: <strong>{{ mesReferencia }}</strong></p>
      </div>
      <button class="btn-logout" (click)="fazerLogout()">Sair ×</button>
    </header>

    <!-- O resto do HTML do seu painel de finanças vai aqui embaixo... -->
    <!-- (Card de Saldo Geral, Listas, Barras de Progresso, etc.) -->

  </div>

</div>
